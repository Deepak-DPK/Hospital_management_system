<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon">🏥</div>
        <div class="sidebar__logo-text">
          <h1>HMS Portal</h1>
          <p>Hospital Management</p>
        </div>
        <button onclick="closeSidebar()" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;display:none" id="sidebar-close-btn">✕</button>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav"></nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar" id="sb-avatar">?</div>
          <div class="sidebar__user-info">
            <strong id="sb-name">Loading…</strong>
            <span id="sb-role"></span>
          </div>
        </div>
        <button onclick="logout()" class="btn btn--ghost btn--sm" style="width:100%;justify-content:center">
          ← Logout
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar__left">
          <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
          <div>
            <div class="topbar__title" id="page-title">Dashboard</div>
            <div class="topbar__breadcrumb" id="topbar-date"></div>
          </div>
        </div>
        <div class="topbar__right">
          <span class="badge badge--blue" id="role-badge"></span>
        </div>
      </div>

      <div class="page-body" id="page-body">
        <p class="text-muted" style="padding:2rem 0">Loading…</p>
      </div>
    </div>
  </div>

  <!-- Generic Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__box" id="modal-box">
      <button class="modal__close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
